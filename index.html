<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Crossword Go — Can You Reach Level 5?</title>
<style>
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#000; color:#fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent; user-select:none; -webkit-user-select:none;
    touch-action: none;
  }
  #app{
    position:fixed; inset:0; display:grid; place-items:center;
    background:#0a0f24;
  }
  #stage{
    position:relative; width:100%; height:100%; max-width:540px; max-height:960px;
    aspect-ratio: 9 / 16;
    background-color:#0a0f24;
    background-image: var(--backdrop, none);
    background-size: cover; background-position:center;
    overflow:hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }
  /* dim layer over backdrop for readability */
  #stage::before{
    content:""; position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(8,12,40,0.35) 0%, rgba(8,12,40,0.15) 30%, rgba(8,12,40,0.55) 100%);
    pointer-events:none;
  }

  /* ============ HEADER ============ */
  .header{
    position:absolute; top:0; left:0; right:0; padding:14px 18px 12px;
    text-align:center; z-index:5;
    background: linear-gradient(180deg, rgba(8,12,40,0.85), rgba(8,12,40,0));
  }
  .header .line1{ font-size:18px; font-weight:800; letter-spacing:0.5px; color:#fff; }
  .header .line1 .accent{ color:#ffd84a; }
  .header .line2{ font-size:22px; font-weight:900; letter-spacing:0.5px; color:#fff; margin-top:2px; }

  /* ============ STREAK PILL ============ */
  #streak{
    position:absolute; top:18px; right:14px;
    background: linear-gradient(180deg, rgba(255,91,108,0.95), rgba(191,10,48,0.95));
    color:#fff; font-weight:900; font-size:15px; letter-spacing:1px;
    padding: 8px 14px; border-radius:18px;
    box-shadow: 0 3px 0 rgba(120,10,30,0.5), 0 4px 12px rgba(0,0,0,0.35);
    z-index:6; opacity:0; transform: translateY(-8px) scale(0.7);
    transition: opacity .25s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;
  }
  #streak.show{ opacity:1; transform: translateY(0) scale(1); }
  #streak.fire{
    background: linear-gradient(180deg, #ffd84a, #ff5b6c);
    color:#3a1010;
    box-shadow: 0 0 24px rgba(255,180,40,0.85), 0 3px 0 rgba(120,10,30,0.5);
    animation: streakGlow 0.9s ease-in-out infinite;
  }
  @keyframes streakGlow {
    0%,100% { box-shadow: 0 0 18px rgba(255,180,40,0.75), 0 3px 0 rgba(120,10,30,0.5); }
    50%     { box-shadow: 0 0 30px rgba(255,180,40,1.0), 0 3px 0 rgba(120,10,30,0.5); }
  }
  @keyframes streakBump {
    0% { transform: scale(1); }
    40%{ transform: scale(1.25); }
    100%{ transform: scale(1); }
  }
  #streak.bump{ animation: streakBump .35s ease-out; }

  /* ============ PRAISE POPS ============ */
  #praise{
    position:absolute; left:50%; top:44%;
    transform: translate(-50%, -50%) scale(0.4);
    font-size: 56px; font-weight: 900; letter-spacing: 1px;
    text-align:center; pointer-events:none; z-index:15;
    opacity: 0;
    max-width: 90%;
    color: #ffd84a;
    text-shadow:
      0 0 14px rgba(0,0,0,0.85),
      0 4px 0 #bf0a30,
      0 6px 18px rgba(0,0,0,0.7),
      0 0 24px rgba(255,216,74,0.55);
    white-space:nowrap;
  }
  #praise.pop{ animation: praisePop 1.25s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes praisePop {
    0%   { opacity: 0; transform: translate(-50%, -40%) scale(0.4) rotate(-5deg); }
    18%  { opacity: 1; transform: translate(-50%, -55%) scale(1.35) rotate(3deg); }
    35%  { opacity: 1; transform: translate(-50%, -55%) scale(1.05) rotate(0deg); }
    72%  { opacity: 1; transform: translate(-50%, -58%) scale(1.05) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -78%) scale(0.95) rotate(0deg); }
  }

  /* ============ STAGE SHAKE ============ */
  @keyframes stageShake {
    0%,100% { transform: translate(0,0); }
    20%{ transform: translate(-2px, 1px); }
    40%{ transform: translate(2px, -1px); }
    60%{ transform: translate(-1px, 2px); }
    80%{ transform: translate(1px, -2px); }
  }
  #stage.shake > *:not(.overlay):not(#fx){ animation: stageShake .18s ease-in-out; }

  /* ============ RING BURST ============ */
  @keyframes ringBurst {
    0%   { opacity: 0.9; transform: translate(-50%,-50%) scale(0.4); }
    100% { opacity: 0;   transform: translate(-50%,-50%) scale(2.6); }
  }
  .ring-burst{
    position:absolute; pointer-events:none; z-index:8;
    width: var(--cell-size); height: var(--cell-size);
    border: 3px solid #ffd84a; border-radius: 50%;
    box-shadow: 0 0 18px rgba(255,216,74,0.85);
    animation: ringBurst .55s ease-out forwards;
  }

  /* ============ WRONG-DROP CELL FLASH ============ */
  @keyframes wrongFlash {
    0%   { background:#ffffff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); transform: translateX(0); }
    15%  { background:#ff5b6c; box-shadow: inset 0 0 0 3px #bf0a30, 0 0 18px rgba(255,40,60,0.9); transform: translateX(-3px); }
    35%  { background:#ff5b6c; transform: translateX(3px); }
    55%  { background:#ff5b6c; transform: translateX(-2px); }
    100% { background:#ffffff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); transform: translateX(0); }
  }
  .cell.wrong-flash{ animation: wrongFlash .55s ease-out; }

  /* ============ CORRECT-DROP CELL FLASH ============ */
  @keyframes correctFlash {
    0%   { background:#a8f0a0; box-shadow: 0 0 0 3px #4ec84e, 0 0 18px rgba(110,224,74,0.85); }
    60%  { background:#cdf0c5; }
    100% { background:#dff1f4; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); }
  }
  .cell.correct-flash{ animation: correctFlash .42s ease-out; }

  /* ============ TILE WIGGLE ============ */
  @keyframes tileWiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-8deg); }
    50% { transform: rotate(7deg); }
    75% { transform: rotate(-5deg); }
  }
  .tile.wiggle{ animation: tileWiggle .28s ease-in-out; }

  /* ============ HINT PILL ============ */
  .hint-pill{
    position:absolute; top:74px; left:50%; transform:translateX(-50%);
    background: rgba(220,225,235,0.85); color:#102;
    padding:10px 28px; border-radius:32px;
    font-weight:800; font-size:18px; letter-spacing:1px;
    z-index:5; white-space:nowrap;
    transition: opacity .25s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }

  /* ============ GRID STAGE ============ */
  #grid-stage{
    position:absolute; left:0; right:0;
    top: 130px; bottom: 200px;
    display:flex; align-items:center; justify-content:center;
    z-index:2;
  }
  .grid{
    display:grid; gap:3px;
    --cell-size: 36px;
  }
  .grid.tease{
    filter: blur(2.5px); opacity: 0.55;
    pointer-events:none;
  }
  .cell{
    width: var(--cell-size); height: var(--cell-size);
    position:relative;
    border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size: calc(var(--cell-size) * 0.55);
    color:#102;
    transition: background-color .2s ease, transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
  }
  .cell.off{ background:transparent; }
  .cell.prefilled{ background:#dff1f4; }
  .cell.empty{ background:#ffffff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); }
  .cell.correct{ background:#dff1f4; }
  .cell.active{ box-shadow: 0 0 0 1px rgba(255,216,74,0.5); }
  .cell.target{ animation: targetPulse 1.2s ease-in-out infinite; }
  .cell.cursor{ animation: cursorPulse 1.1s ease-in-out infinite; background:#fff8d8; }
  .cell.celebrate{ animation: celebrate .55s ease-out; }
  .cell .num{
    position:absolute; top:1px; left:3px; font-size:9px; font-weight:700;
    color:#102; opacity:0.75;
  }
  @keyframes targetPulse {
    0%,100% { box-shadow: 0 0 0 2px #ffd84a, 0 0 14px rgba(255,216,74,0.6); }
    50%     { box-shadow: 0 0 0 3px #ffd84a, 0 0 22px rgba(255,216,74,0.9); }
  }
  @keyframes cursorPulse {
    0%,100% { box-shadow: 0 0 0 3px #ffd84a, 0 0 12px rgba(255,216,74,0.55); }
    50%     { box-shadow: 0 0 0 4px #ffd84a, 0 0 22px rgba(255,216,74,0.95); }
  }
  @keyframes celebrate {
    0%   { transform: scale(1); background:#dff1f4; }
    50%  { transform: scale(1.18); background:#ffd84a; }
    100% { transform: scale(1); background:#dff1f4; }
  }

  /* ============ TILE BANK ============ */
  #bank{
    position:absolute; left:0; right:0; bottom: 90px;
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap;
    gap:8px; padding: 8px 14px;
    z-index:3;
    max-height: 110px; overflow:hidden;
  }
  .tile{
    width: 44px; height: 50px;
    background: linear-gradient(180deg, #fbe4a8 0%, #f3c777 100%);
    border-radius: 8px;
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size: 26px; color:#3a2a10;
    box-shadow: 0 3px 0 rgba(140,100,40,0.55), 0 5px 10px rgba(0,0,0,0.25);
    cursor: pointer; touch-action: manipulation;
    transition: transform .12s ease, opacity .25s ease, box-shadow .2s ease;
    user-select:none;
  }
  .tile:active{ transform: translateY(2px) scale(0.95); box-shadow: 0 1px 0 rgba(140,100,40,0.55), 0 3px 6px rgba(0,0,0,0.25); }
  .tile.dragging{
    z-index:50;
    box-shadow: 0 6px 0 rgba(140,100,40,0.55), 0 14px 22px rgba(0,0,0,0.4);
    transition: none;
  }
  .tile.gone{ opacity:0; transform: scale(0.4); pointer-events:none; }
  .tile.target{ animation: tilePulse 1.2s ease-in-out infinite; }
  @keyframes tilePulse {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-6px); }
  }

  /* ============ CTA / GO BUTTON (placeholder for "GO" — not used in playable but matches reference) ============ */
  #go-btn{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom: 22px;
    background: linear-gradient(180deg, #6ee04a 0%, #3aa424 100%);
    color:#fff; font-weight:900; font-size:24px; letter-spacing:2px;
    padding: 12px 56px; border-radius: 28px;
    box-shadow: 0 4px 0 #267016, 0 8px 16px rgba(0,0,0,0.4);
    cursor:pointer; z-index:3; opacity:0; pointer-events:none;
    transition: opacity .3s ease;
  }
  #go-btn.show{ opacity:1; pointer-events:auto; }
  #go-btn::after{
    content:""; position:absolute; top:6px; right:14px;
    width:10px; height:10px; border-radius:50%;
    background: rgba(255,255,255,0.7); filter: blur(1px);
  }

  /* ============ FX CANVAS ============ */
  #fx{
    position:absolute; inset:0; pointer-events:none; z-index:9;
  }

  /* ============ FINGER HELPER ============ */
  #finger{
    position:absolute; width:90px; height:auto;
    pointer-events:none; z-index:10;
    opacity:0; transition: opacity .25s ease;
    transform-origin: 30% 0%;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.35));
  }
  #finger.show{ opacity:1; }
  /* fallback when hand.png missing — show emoji */
  #finger.emoji{
    font-size:64px; width:auto; height:auto; line-height:1;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
  }

  /* ============ OVERLAY CARDS (intro / win / cta) ============ */
  .overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; padding: 40px 28px; z-index:20;
    background: radial-gradient(circle at 50% 35%, rgba(20,30,80,0.45), rgba(8,12,40,0.85));
    opacity:0; pointer-events:none;
    transition: opacity .35s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }

  /* INTRO */
  #intro .badge{
    background: linear-gradient(180deg, #ffd84a 0%, #f0a020 100%);
    color:#3a2a10; font-weight:900; font-size:15px; letter-spacing:1.5px;
    padding: 6px 18px; border-radius: 20px;
    box-shadow: 0 4px 0 rgba(140,80,10,0.4), 0 6px 14px rgba(0,0,0,0.35);
    margin-bottom: 18px;
  }
  #intro .copy{
    font-size: 34px; font-weight:900; line-height:1.1;
    text-align:center; max-width: 460px;
    text-shadow: 0 3px 10px rgba(0,0,0,0.6);
    margin-bottom: 28px;
  }
  #intro .copy .pct{ color:#ffd84a; font-size: 64px; display:block; }
  #intro .btn{
    background: linear-gradient(180deg, #ff5b6c 0%, #c8203a 100%);
    color:#fff; font-weight:900; font-size:22px; letter-spacing:2px;
    padding: 14px 42px; border-radius: 32px;
    box-shadow: 0 5px 0 #7a1224, 0 10px 18px rgba(0,0,0,0.45);
    animation: btnPulse 1.1s ease-in-out infinite;
    cursor:pointer;
  }
  @keyframes btnPulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.06); }
  }

  /* WIN BANNER */
  #win-banner{
    background: linear-gradient(180deg, rgba(20,30,80,0.0), rgba(8,12,40,0.0));
    pointer-events:none;
  }
  #win-banner .text{
    font-size: 38px; font-weight:900; line-height:1.1;
    text-align:center; color:#fff;
    text-shadow: 0 4px 12px rgba(0,0,0,0.7), 0 0 24px rgba(255,216,74,0.5);
    transform: scale(0.7); transition: transform .5s cubic-bezier(.34,1.56,.64,1);
  }
  #win-banner.show .text{ transform: scale(1); }

  /* CTA */
  #cta .card{
    background: linear-gradient(180deg, #ffffff 0%, #f1f4ff 100%);
    color:#102; border-radius: 22px;
    padding: 22px 22px 26px; width: min(86%, 380px);
    text-align:center;
    box-shadow: 0 14px 40px rgba(0,0,0,0.55);
    transform: translateY(40px); transition: transform .45s cubic-bezier(.34,1.56,.64,1);
  }
  #cta.show .card{ transform: translateY(0); }
  #cta .logo{
    width: 140px; height: 60px;
    margin: 0 auto 10px;
    background-position:center; background-repeat:no-repeat; background-size:contain;
  }
  #cta .logo.fallback{
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:20px; color:#102;
    background: linear-gradient(180deg, #ffd84a, #f0a020);
    border-radius: 10px; padding: 6px 12px;
    width: auto;
  }
  #cta .headline{ font-size: 24px; font-weight:900; line-height:1.2; margin: 6px 0 4px; }
  #cta .sub{ font-size: 14px; color:#445; margin-bottom: 16px; }
  #cta .install-btn{
    background: linear-gradient(180deg, #6ee04a 0%, #3aa424 100%);
    color:#fff; font-weight:900; font-size:22px; letter-spacing:1.5px;
    padding: 14px 0; border-radius: 14px; cursor:pointer;
    box-shadow: 0 5px 0 #267016, 0 8px 16px rgba(0,0,0,0.3);
    animation: btnPulse 1.1s ease-in-out infinite;
  }
  #cta .lock-badge{
    position:absolute; top: 60px; left:50%; transform:translateX(-50%);
    background: rgba(20,30,80,0.85); color:#ffd84a;
    padding: 8px 18px; border-radius: 22px;
    font-weight:900; font-size:18px; letter-spacing:2px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.45);
    animation: btnPulse 1.4s ease-in-out infinite;
    z-index:21;
  }

  /* ============ utility ============ */
  .hide{ display:none !important; }
</style>
</head>
<body>
<div id="app">
  <div id="stage">

    <!-- header (theme line) -->
    <div class="header">
      <div class="line1">THEME: <span class="accent">US STATE CAPITALS</span></div>
      <div class="line2">CAN YOU SOLVE THEM?</div>
    </div>

    <!-- hint pill -->
    <div class="hint-pill" id="hint">HINT : —</div>

    <!-- streak pill -->
    <div id="streak">🔥 ×0</div>

    <!-- praise pop -->
    <div id="praise"></div>

    <!-- grid -->
    <div id="grid-stage">
      <div class="grid" id="grid"></div>
    </div>

    <!-- tile bank -->
    <div id="bank"></div>

    <!-- decorative GO button (idle, never required) -->
    <div id="go-btn">GO</div>

    <!-- particle canvas overlay -->
    <canvas id="fx"></canvas>

    <!-- helper finger -->
    <div id="finger" class="emoji">👆</div>

    <!-- INTRO overlay -->
    <div class="overlay" id="intro">
      <div class="badge">ONLY THE BEST</div>
      <div class="copy">
        Only <span class="pct">1%</span>
        of Americans can reach Level 5
      </div>
      <div class="btn" id="intro-btn">PROVE IT</div>
    </div>

    <!-- WIN banner overlay -->
    <div class="overlay" id="win-banner">
      <div class="text" id="win-text">YOU REACHED LEVEL 5! 🎉</div>
    </div>

    <!-- CTA overlay (with tease grid behind) -->
    <div class="overlay" id="cta">
      <div class="lock-badge" id="lock-badge">🔒 LEVEL 6</div>
      <div class="card">
        <div class="logo" id="cta-logo"></div>
        <div class="headline" id="cta-headline">Install to unlock Level 6</div>
        <div class="sub" id="cta-sub">Reach Level 10 for real — free to play</div>
        <div class="install-btn" id="cta-btn">INSTALL NOW</div>
      </div>
    </div>

  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
